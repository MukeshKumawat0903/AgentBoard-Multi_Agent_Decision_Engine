[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
markers = [
    "integration: marks tests that call the real GROQ API (deselect with -m 'not integration')",
    "unit: marks tests that use mocked LLM clients only (default; no network)",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
    "ignore::pytest.PytestUnhandledThreadExceptionWarning",
    "ignore::pytest.PytestUnraisableExceptionWarning",
]

# Phase 6.5 — coverage configuration
[tool.coverage.run]
source = ["app"]
omit = ["app/__init__.py", "*/tests/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 60   # target 90 once full test expansion ships

# Phase 6.5 — mypy configuration
[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true     # LangGraph/LangChain have no complete stubs
warn_return_any = true
warn_unused_ignores = false       # many type: ignore comments for untyped 3rd-party
disallow_untyped_defs = false     # defer strict mode until stub coverage improves
check_untyped_defs = true
no_implicit_optional = true
exclude = ["tests/", "alembic/"]
